<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aisha Home AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f0f1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:560px}
.card{background:#16162a;border:1px solid #2a2a45;border-radius:20px;padding:60px 28px;cursor:pointer;transition:border-color 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center;text-decoration:none}
.card:hover{border-color:#6366f1;transform:translateY(-4px)}
.card:active{transform:translateY(-1px)}
.card-title{font-size:24px;font-weight:700;color:#fff}
</style>
</head>
<body>
<div class="cards">
  <a href="aisha.html" class="card"><span class="card-title">Aisha</span></a>
  <a href="oqtosh.html" class="card"><span class="card-title">Oqtosh</span></a>
</div>
</body>
</html>
